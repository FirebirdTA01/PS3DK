# spu_printf_{initialize,finalize,attach_group,attach_thread,
# detach_group,detach_thread} elided from the FNID stub set: their
# routine in libc.sprx (and the parallel HLE in RPCS3) does not wire
# the SPU thread group's printf event-port (port 1) to a PPU event
# queue via sys_spu_thread_group_connect_event_all_threads, so SPU
# code calling spu_printf() ends up with sys_spu_thread_send_event
# returning CELL_ENOTCONN.  We provide working real-PPU
# implementations under sdk/libc_stub_extras/ that the
# scripts/build-cell-stub-archives.sh pipeline appends to
# libc_stub.a after the FNID stub generation step; the archive ends
# up with the same six user-facing names but with a real
# event-queue-driven handler behind them.
