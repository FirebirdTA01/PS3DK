# cellFs — file system surface for the sys_fs SPRX module.
#
# Signatures lifted from the public reference SDK 475 cell_fs_file_api.h
# header (paraphrased — never verbatim).  10 entries near the bottom
# carry empty signatures: those functions are exported by the SPRX but
# stripped from the 475 public headers (per memory:
# feedback_stripped_nids_pattern).  We keep them in the stub archive so
# applications that forward-declare them link cleanly; we don't expose
# them through cell/cell_fs.h.

library: sys_fs
version: 1
module: sys_fs
archive_name: fs

exports:
  # ---- File I/O ----
  - name: cellFsOpen
    nid: '0x718bf5f8'
    signature: |
      CellFsErrno cellFsOpen(const char *path, int flags, int *fd,
                             const void *arg, uint64_t size);
    notes: extracted from _sys_fs_0001_44.o
  - name: cellFsRead
    nid: '0x4d5ff8e2'
    signature: |
      CellFsErrno cellFsRead(int fd, void *buf, uint64_t nbytes,
                             uint64_t *nread);
