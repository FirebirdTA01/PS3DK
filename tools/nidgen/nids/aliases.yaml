# tools/nidgen/nids/aliases.yaml — PSL1GHT-rename coverage aliases.
#
# Maps each Sony canonical symbol name (left of colon) to one or more names
# that our install tree may define and that semantically satisfy Sony's
# export (right of colon).  coverage-report uses this to count renamed
# PSL1GHT wrappers as coverage instead of marking the Sony name as missing.
#
# Rename rules applied by `coverage-report --suggest-aliases`:
#   R1. _sys_<snake>  → sys<CamelSnake>           (e.g. _sys_malloc → sysMalloc)
#   R2.  sys_<snake>  → sys<CamelSnake>           (e.g.  sys_lwmutex_lock → sysLwMutexLock)
#   R3. cell<CamelRest> → <camelRest>             (e.g. cellMsgDialogOpen → msgDialogOpen)
#   R4. cell_<snake>   → <CamelSnake>
#
# Regenerate after a significant PSL1GHT or install-tree change:
#
#   coverage-report --nid-db tools/nidgen/nids/extracted --install stage/ps3dev \
#     --suggest-aliases tools/nidgen/nids/aliases.yaml
#
# The regenerator filters out candidates that don't actually match anything
# in the install tree, so committed entries are load-bearing.  Hand edits
# (adding semantic aliases the rules don't catch) are welcome — just keep
# the file sorted by key so diffs stay readable.

