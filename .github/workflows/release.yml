name: Release

# Triggered on every v-prefixed tag push.  Verifies version metadata is
# consistent, builds the host tools (Linux + Windows), and publishes a
# GitHub Release with sources + tool binaries attached.
#
# Also exposed via workflow_dispatch so each job can be exercised without
# burning a tag — useful when first wiring a new job (e.g. the
# build-toolchain-windows long-pole) into the release pipeline.  Manual
# dispatch builds and uploads artifacts but skips the publish step.
#
# PPU/SPU toolchain binaries and the SDK runtime libraries are deferred
# to v0.2.x / v0.3.x — see docs/VERSIONING.md "Release-payload roadmap".

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      run_toolchain_windows:
        description: 'Run build-toolchain-windows (long, ~2-3h)'
        type: boolean
        default: false

permissions:
  contents: write   # create releases + upload assets

jobs:
  verify-version:
    name: Verify version metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      bare:    ${{ steps.v.outputs.bare }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # version.sh needs full tag history

      - id: v
        name: Run scripts/version.sh
        run: |
          version="$(./scripts/version.sh --format=plain)"
          bare="$(./scripts/version.sh --format=bare)"
          echo "Generator out: $version"
          # On a tag push the GITHUB_REF is refs/tags/<tag> and we enforce
          # version.sh exactly matches the tag.  On manual dispatch
          # (workflow_dispatch) GITHUB_REF is refs/heads/<branch> and we
          # skip the match — the dispatch is for testing the pipeline, not
          # publishing a real release, and the publish job is gated below
          # so nothing ships.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF##*/}"
            echo "Tag:           $tag"
            if [ "$version" != "$tag" ]; then
              echo "::error::version.sh ($version) does not match the pushed tag ($tag). The tag must point at a commit where version.sh emits exactly that tag."
              exit 1
            fi
          else
            echo "Manual dispatch — skipping tag/version match check."
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bare=$bare" >> "$GITHUB_OUTPUT"

      - name: Check Rust workspace version is in sync
        # Same rationale as the tag/version check above — the sync test
        # gates that tools/Cargo.toml has been bumped to the upcoming
        # tag's version before the tag was pushed.  On
        # workflow_dispatch the working tree's version is whatever
        # version.sh derives from "tag + commits-since" and Cargo.toml
        # legitimately lags.  The dispatch never publishes, so we just
        # log the gap and move on.
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            ./scripts/sync-versions.sh --check
          else
            echo "Manual dispatch — running sync-versions.sh in write mode so the build picks up the current version, but not failing on drift."
            ./scripts/sync-versions.sh
          fi

  build-host-tools-linux:
    name: Build host tools (linux x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libelf-dev cmake ninja-build python3

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('tools/Cargo.lock') }}

      - name: Build Rust workspace (release)
        working-directory: tools
        run: cargo build --release --workspace

      - name: Build sprx-linker
        run: make -C tools/sprx-linker

      - name: Build rsx-cg-compiler
        run: |
          cmake -S tools/rsx-cg-compiler -B tools/rsx-cg-compiler/build \
              -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/rsx-cg-compiler/build --target rsx-cg-compiler

      - name: Smoke-test --version flags
        run: |
          tools/target/release/nidgen --version
          tools/target/release/abi-verify --version
          tools/target/release/coverage-report --version
          tools/rsx-cg-compiler/build/rsx-cg-compiler --version
          # sprx-linker has no --version yet; just confirm it's a runnable ELF.
          file tools/sprx-linker/sprxlinker

      - name: Stage tool tarball
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-tools-${version}-linux-x86_64"
          mkdir -p "$stage/bin"
          # Rust binaries.
          for bin in nidgen abi-verify coverage-report; do
            cp "tools/target/release/$bin" "$stage/bin/"
          done
          # C/C++ binaries.
          cp tools/sprx-linker/sprxlinker "$stage/bin/"
          cp tools/rsx-cg-compiler/build/rsx-cg-compiler "$stage/bin/"
          # Strip everything (best-effort).
          strip "$stage/bin/"* || true
          # Bundle a tiny README that lists runtime deps.
          cat > "$stage/README.txt" <<EOF
          PS3 Custom Toolchain — host tools, ${version}, linux x86_64.

          Drop the contents of bin/ into \$PS3DEV/bin/ on a host where the
          toolchain is already built, or anywhere on \$PATH for ad-hoc use.

          Runtime dependencies (dynamic):
            * sprxlinker         — libelf, libz, libzstd
            * rsx-cg-compiler    — libstdc++ (system)
            * nidgen, abi-verify, coverage-report — none beyond glibc

          See CHANGELOG.md for what changed in this release.
          EOF
          cp CHANGELOG.md "$stage/" || true
          tar -cJf "${stage}.tar.xz" "$stage"
          sha256sum "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: host-tools-linux-x86_64
          path: ps3-sdk-tools-*-linux-x86_64.tar.*

  build-host-tools-windows:
    name: Build host tools (windows x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps + mingw-w64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build git wget zip unzip xz-utils \
              file perl pkg-config mingw-w64 g++-mingw-w64-x86-64
          which x86_64-w64-mingw32-gcc x86_64-w64-mingw32-g++ x86_64-w64-mingw32-windres

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: cargo-release-host-tools-windows-${{ runner.os }}-${{ hashFiles('tools/Cargo.lock') }}

      - name: Cache host-tools dependency builds
        uses: actions/cache@v5
        with:
          path: ~/ps3tc/build/host-tools-windows
          key: host-tools-windows-deps-${{ runner.os }}-${{ hashFiles('scripts/build-host-tools-windows.sh') }}
          restore-keys: |
            host-tools-windows-deps-${{ runner.os }}-

      - name: Probe toolchains
        run: |
          set -e
          gcc --version | head -1
          x86_64-w64-mingw32-gcc --version | head -1
          cargo --version
          rustc --version
          cmake --version | head -1

      - name: Cross-build Windows host tools
        run: |
          set -e
          ./scripts/build-host-tools-windows.sh

      - name: Validate staged host tools
        run: |
          set -e
          bin_dir="stage/host-tools-windows/bin"
          required_bins=(
            abi-verify.exe
            bin2s.exe
            cgcomp.exe
            coverage-report.exe
            fself.exe
            make_self.exe
            make_self_npdrm.exe
            nidgen.exe
            package_finalize.exe
            rsx-cg-compiler.exe
            sprxlinker.exe
          )
          required_files=(
            pkg.py
            sfo.py
            fself.py
            Struct.py
            sfo.xml
          )
          missing=0
          for bin in "${required_bins[@]}"; do
            if [ ! -f "$bin_dir/$bin" ]; then
              echo "::error::missing required Windows host tool: $bin_dir/$bin"
              missing=1
            fi
          done
          for file in "${required_files[@]}"; do
            if [ ! -f "$bin_dir/$file" ]; then
              echo "::error::missing required Windows host helper: $bin_dir/$file"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

          file "$bin_dir"/*.exe
          if [ -f "$bin_dir/cg.dll" ]; then
            file "$bin_dir/cg.dll"
          else
            echo "::warning::cg.dll is not staged; cgcomp.exe is shipped for legacy callers, but rsx-cg-compiler.exe is the supported shader compiler."
          fi

      - name: Stage tool zip
        run: |
          set -e
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-tools-${version}-windows-x86_64"
          mkdir -p "$stage/bin"
          cp -a stage/host-tools-windows/bin/. "$stage/bin/"
          # Strip best-effort.
          x86_64-w64-mingw32-strip "$stage/bin/"*.exe || true
          # Bundled README.
          cat > "$stage/README.txt" <<EOF
          PS3 Custom Toolchain — host tools, ${version}, windows x86_64.

          Drop the contents of bin\\ into %PS3DEV%\\bin\\ on a Windows host
          where the toolchain is already built, or anywhere on %PATH% for
          ad-hoc use.

          All .exe files are statically linked against MinGW-w64 runtime
          and their support libraries (libelf, zlib, zstd, GMP, OpenSSL);
          they have no DLL runtime dependencies beyond what every Windows
          install ships (kernel32, msvcrt).

          See CHANGELOG.md for what changed in this release.
          EOF
          cp CHANGELOG.md "$stage/" || true
          # Use zip (canonical Windows distribution format) rather than
          # tar.xz — Windows users can double-click it.
          zip -r -9 "${stage}.zip" "$stage"
          sha256sum "${stage}.zip" > "${stage}.zip.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: host-tools-windows-x86_64
          path: |
            ps3-sdk-tools-*-windows-x86_64.zip
            ps3-sdk-tools-*-windows-x86_64.zip.sha256

  build-source-bundle:
    name: Build source bundle
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Stage source bundle
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-src-${version}"
          # Curated archive: the parts actually authored in this repo.
          # Excludes vendored upstream (src/ via .gitignore) and the
          # private reference mount (reference/ via .gitignore).
          git archive --format=tar --prefix="${stage}/" HEAD \
              | xz -T0 > "${stage}.tar.xz"
          sha256sum "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: source-bundle
          path: ps3-sdk-src-*.tar.*

  # -------------------------------------------------------------------
  # Native PPU + SPU toolchain builds, run in PARALLEL.  Each emits a
  # tarball of $PS3DEV/{ppu,spu} that the downstream
  # build-toolchain-windows job downloads and stitches together.
  #
  # Splitting these out cuts the v0.4.x-style serial pipeline from
  # ~2.5-3h to ~60-90 min wall-clock by overlapping the two GCC
  # bootstraps.  Each job also wires up:
  #
  #   * actions/cache for src/upstream — saves 5-10 min of git clones
  #     per run when the cache is warm.  Key includes the build script
  #     hashes so a version-pin bump invalidates correctly.
  #   * ccache (CC=ccache gcc / CXX=ccache g++) — wraps the host
  #     compilation of GCC's own .cc files (the bulk of the bootstrap
  #     cost).  Target-library compile (libgcc / libstdc++ / newlib)
  #     goes through xgcc and bypasses ccache; that's expected and
  #     unavoidable without a more invasive ccache wrapper.  Subsequent
  #     tags should see 70-90% hit rates on the host bootstrap when
  #     GCC versions don't change.
  # -------------------------------------------------------------------
  build-native-ppu:
    name: Build native PPU toolchain (linux)
    if: github.event_name == 'push' || github.event.inputs.run_toolchain_windows == 'true'
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential gcc-12 g++-12 cmake ninja-build texinfo \
              bison flex libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
              zlib1g-dev libreadline-dev libncurses-dev libexpat1-dev \
              libssl-dev libelf-dev python3 python3-dev git wget patch \
              autoconf automake libtool zip unzip ccache

      - name: Cache upstream sources (gcc/binutils-gdb/newlib-cygwin)
        uses: actions/cache@v5
        with:
          path: src/upstream
          key: upstream-${{ hashFiles('scripts/bootstrap.sh', 'scripts/build-ppu-toolchain.sh', 'scripts/build-spu-toolchain.sh') }}
          restore-keys: |
            upstream-

      - name: Cache ccache (ppu)
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          # run_number bakes uniqueness into the save key so each run
          # writes a fresh cache; restore-keys pulls the latest matching
          # prefix at restore time.
          key: ccache-ppu-${{ hashFiles('scripts/build-ppu-toolchain.sh', 'patches/ppu/**') }}-${{ github.run_number }}
          restore-keys: |
            ccache-ppu-${{ hashFiles('scripts/build-ppu-toolchain.sh', 'patches/ppu/**') }}-
            ccache-ppu-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          # Plumb ccache into the host-side gcc/g++ that build-ppu-toolchain.sh
          # invokes.  GCC's own bootstrap (compiling gcc/*.cc with the host
          # compiler) is the slowest single step; this is where ccache
          # earns its keep.
          echo "CC=ccache gcc" >> "$GITHUB_ENV"
          echo "CXX=ccache g++" >> "$GITHUB_ENV"

      - name: Bootstrap upstream sources
        run: |
          source scripts/env.sh
          ./scripts/bootstrap.sh

      - name: Build PPU toolchain
        run: |
          source scripts/env.sh
          ./scripts/build-ppu-toolchain.sh
          ccache --show-stats

      - name: Tar $PS3DEV/ppu
        run: |
          source scripts/env.sh
          cd "$(dirname "$PS3DEV")"
          tar -cJf /tmp/ps3dev-ppu.tar.xz "$(basename "$PS3DEV")/ppu"
          ls -lh /tmp/ps3dev-ppu.tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ps3dev-ppu-native
          path: /tmp/ps3dev-ppu.tar.xz
          retention-days: 1

  build-native-spu:
    name: Build native SPU toolchain (linux)
    if: github.event_name == 'push' || github.event.inputs.run_toolchain_windows == 'true'
    needs: verify-version
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential gcc-12 g++-12 cmake ninja-build texinfo \
              bison flex libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
              zlib1g-dev libreadline-dev libncurses-dev libexpat1-dev \
              libssl-dev libelf-dev python3 python3-dev git wget patch \
              autoconf automake libtool zip unzip ccache

      - name: Cache upstream sources (gcc/binutils-gdb/newlib-cygwin)
        uses: actions/cache@v5
        with:
          path: src/upstream
          key: upstream-${{ hashFiles('scripts/bootstrap.sh', 'scripts/build-ppu-toolchain.sh', 'scripts/build-spu-toolchain.sh') }}
          restore-keys: |
            upstream-

      - name: Cache ccache (spu)
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-spu-${{ hashFiles('scripts/build-spu-toolchain.sh', 'patches/spu/**') }}-${{ github.run_number }}
          restore-keys: |
            ccache-spu-${{ hashFiles('scripts/build-spu-toolchain.sh', 'patches/spu/**') }}-
            ccache-spu-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CC=ccache gcc" >> "$GITHUB_ENV"
          echo "CXX=ccache g++" >> "$GITHUB_ENV"

      - name: Bootstrap upstream sources
        run: |
          source scripts/env.sh
          ./scripts/bootstrap.sh

      - name: Build SPU toolchain
        run: |
          source scripts/env.sh
          ./scripts/build-spu-toolchain.sh
          ccache --show-stats

      - name: Tar $PS3DEV/spu
        run: |
          source scripts/env.sh
          cd "$(dirname "$PS3DEV")"
          tar -cJf /tmp/ps3dev-spu.tar.xz "$(basename "$PS3DEV")/spu"
          ls -lh /tmp/ps3dev-spu.tar.xz

      - uses: actions/upload-artifact@v5
        with:
          name: ps3dev-spu-native
          path: /tmp/ps3dev-spu.tar.xz
          retention-days: 1

  # -------------------------------------------------------------------
  # Combine + cross-build + package.  Downloads the parallel native
  # PPU/SPU artifacts, runs PSL1GHT / portlibs / our SDK / stub archives
  # / cross-builds / package_windows_release.  ccache is plumbed here
  # too — the cross-build re-runs GCC's bootstrap with --host=mingw and
  # benefits from the same host-side .cc cache.
  # -------------------------------------------------------------------
  build-toolchain-windows:
    name: Build toolchain (windows x86_64)
    if: github.event_name == 'push' || github.event.inputs.run_toolchain_windows == 'true'
    needs:
      - verify-version
      - build-host-tools-windows
      - build-native-ppu
      - build-native-spu
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps + mingw-w64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential gcc-12 g++-12 cmake ninja-build texinfo \
              bison flex libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
              zlib1g-dev libreadline-dev libncurses-dev libexpat1-dev \
              libssl-dev libelf-dev python3 python3-dev git wget patch \
              autoconf automake libtool zip unzip ccache \
              mingw-w64 g++-mingw-w64-x86-64
          # Verify the mingw cross compiler resolves before anything is built —
          # cross-build silently degrades into "build only host bits then
          # complain at install time" if the cross gcc isn't on PATH.
          which x86_64-w64-mingw32-gcc x86_64-w64-mingw32-g++

      - uses: dtolnay/rust-toolchain@stable

      - name: Probe build env
        run: |
          gcc --version | head -1
          x86_64-w64-mingw32-gcc --version | head -1
          rustc --version
          cmake --version | head -1

      - name: Cache upstream sources
        uses: actions/cache@v5
        with:
          path: src/upstream
          key: upstream-${{ hashFiles('scripts/bootstrap.sh', 'scripts/build-ppu-toolchain.sh', 'scripts/build-spu-toolchain.sh') }}
          restore-keys: |
            upstream-

      - name: Cache ccache (cross)
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-cross-${{ hashFiles('scripts/build-ppu-toolchain.sh', 'scripts/build-spu-toolchain.sh', 'patches/**') }}-${{ github.run_number }}
          restore-keys: |
            ccache-cross-${{ hashFiles('scripts/build-ppu-toolchain.sh', 'scripts/build-spu-toolchain.sh', 'patches/**') }}-
            ccache-cross-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CC=ccache gcc" >> "$GITHUB_ENV"
          echo "CXX=ccache g++" >> "$GITHUB_ENV"

      - name: Bootstrap upstream sources
        run: |
          source scripts/env.sh
          ./scripts/bootstrap.sh

      - name: Download native PPU artifact
        uses: actions/download-artifact@v5
        with:
          name: ps3dev-ppu-native
          path: artifacts/ps3dev-ppu

      - name: Download native SPU artifact
        uses: actions/download-artifact@v5
        with:
          name: ps3dev-spu-native
          path: artifacts/ps3dev-spu

      - name: Extract native PPU + SPU into stage/ps3dev
        run: |
          source scripts/env.sh
          mkdir -p stage
          tar -C stage -xf artifacts/ps3dev-ppu/ps3dev-ppu.tar.xz
          tar -C stage -xf artifacts/ps3dev-spu/ps3dev-spu.tar.xz
          test -x "$PS3DEV/ppu/bin/powerpc64-ps3-elf-gcc"
          test -x "$PS3DEV/spu/bin/spu-elf-gcc"
          "$PS3DEV/ppu/bin/powerpc64-ps3-elf-gcc" --version | head -1
          "$PS3DEV/spu/bin/spu-elf-gcc" --version | head -1

      - name: Stage 0 — PSL1GHT runtime
        run: |
          source scripts/env.sh
          ./scripts/build-psl1ght.sh

      - name: Stage 0 — portlibs
        run: |
          source scripts/env.sh
          ./scripts/build-portlibs.sh

      - name: Build rsx-cg-compiler (native, for SDK shader compile)
        # sdk/libdbgfont's Makefile compiles its .vcg/.fcg shaders at
        # build time via rsx-cg-compiler (commit 2d94a38).  The host-
        # tools-windows artifact only contains the .exe build, which
        # can't run on this Linux runner, so build the native binary
        # here.  The libdbgfont Makefile picks it up from
        # tools/rsx-cg-compiler/build/rsx-cg-compiler.
        run: |
          cmake -S tools/rsx-cg-compiler -B tools/rsx-cg-compiler/build \
              -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/rsx-cg-compiler/build --target rsx-cg-compiler

      - name: Stage 0 — our SDK
        run: |
          source scripts/env.sh
          ./scripts/build-sdk.sh

      - name: Stage 0 — cell stub archives
        run: |
          source scripts/env.sh
          ./scripts/build-cell-stub-archives.sh

      - name: Stage 1 — cross-build PPU toolchain (mingw-w64)
        run: |
          source scripts/env.sh
          ./scripts/build-ppu-toolchain.sh --host=x86_64-w64-mingw32

      - name: Stage 1 — cross-build SPU toolchain (mingw-w64)
        run: |
          source scripts/env.sh
          ./scripts/build-spu-toolchain.sh --host=x86_64-w64-mingw32

      - name: ccache stats post-build
        run: ccache --show-stats || true

      - name: Download host-tools-windows artifact
        uses: actions/download-artifact@v5
        with:
          name: host-tools-windows-x86_64
          path: artifacts/host-tools-windows

      - name: Stage 2 — package Windows release zip
        run: |
          source scripts/env.sh
          tools_zip="$(find artifacts/host-tools-windows -type f -name 'ps3-sdk-tools-*-windows-x86_64.zip' | head -n1)"
          [ -n "$tools_zip" ] || { echo "::error::host-tools-windows zip not found"; exit 1; }
          ./scripts/package-windows-release.sh --tools-zip="$tools_zip"
          ls -lh stage/release/

      - uses: actions/upload-artifact@v5
        with:
          name: toolchain-windows-x86_64
          path: |
            stage/release/ps3-sdk-*-windows-x86_64.zip
            stage/release/ps3-sdk-*-windows-x86_64.zip.sha256

  publish:
    name: Publish GitHub Release
    # Only publish on a real tag push — workflow_dispatch runs the pipeline
    # for verification and uploads artifacts, but never touches the GitHub
    # Releases page.  This lets us test the build-toolchain-windows job
    # without accidentally minting a release.
    if: github.event_name == 'push'
    needs:
      - verify-version
      - build-host-tools-linux
      - build-host-tools-windows
      - build-native-ppu
      - build-native-spu
      - build-toolchain-windows
      - build-source-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true   # flatten all artifacts into artifacts/ directly

      - name: Show downloaded artifacts
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo
          echo "=== Artifacts tree ==="
          if [ -d artifacts ]; then
            find artifacts -type f | sort
          else
            echo "ERROR: artifacts/ directory does not exist."
            exit 1
          fi

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          # Pull the section between '## [<version>]' and the next '## ['.
          # If extraction fails for any reason, fall back to a generic body.
          awk -v want="$version" '
              $0 ~ "^## \\[" want "\\]" { capture = 1; next }
              capture && /^## \[/        { exit }
              capture                    { print }
          ' CHANGELOG.md > .release-notes.md
          if [ ! -s .release-notes.md ]; then
            echo "Release ${version}." > .release-notes.md
          fi
          echo "notes_path=.release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          version="${{ needs.verify-version.outputs.version }}"

          # Collect every release asset.  Listed alphabetically so the GH
          # release page renders them in a stable order.
          mapfile -t assets < <(find artifacts -type f \( \
              -name '*.tar.xz' -o -name '*.tar.xz.sha256' -o \
              -name '*.zip'    -o -name '*.zip.sha256' \) | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets found under artifacts/. Check the download-artifact step output above."
            exit 1
          fi

          echo "Will upload ${#assets[@]} release assets:"
          printf '  %s\n' "${assets[@]}"

          # If a release already exists for this tag (e.g. from a previous
          # workflow run that we want to retry), delete it first so we
          # start with a clean slate.  The git tag itself is preserved.
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists — deleting before recreating."
            gh release delete "$version" --yes --cleanup-tag=false
          fi

          gh release create "$version" \
              --title "$version" \
              --notes-file "${{ steps.notes.outputs.notes_path }}" \
              "${assets[@]}"
