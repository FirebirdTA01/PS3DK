name: Release

# Triggered on every v-prefixed tag push.  Verifies version metadata is
# consistent, builds the host tools (Linux + Windows), and publishes a
# GitHub Release with sources + tool binaries attached.
#
# Also exposed via workflow_dispatch so each job can be exercised without
# burning a tag — useful when first wiring a new job (e.g. the
# build-toolchain-windows long-pole) into the release pipeline.  Manual
# dispatch builds and uploads artifacts but skips the publish step.
#
# PPU/SPU toolchain binaries and the SDK runtime libraries are deferred
# to v0.2.x / v0.3.x — see docs/VERSIONING.md "Release-payload roadmap".

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      run_toolchain_windows:
        description: 'Run build-toolchain-windows (long, ~2-3h)'
        type: boolean
        default: false

permissions:
  contents: write   # create releases + upload assets

jobs:
  verify-version:
    name: Verify version metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      bare:    ${{ steps.v.outputs.bare }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # version.sh needs full tag history

      - id: v
        name: Run scripts/version.sh
        run: |
          version="$(./scripts/version.sh --format=plain)"
          bare="$(./scripts/version.sh --format=bare)"
          echo "Generator out: $version"
          # On a tag push the GITHUB_REF is refs/tags/<tag> and we enforce
          # version.sh exactly matches the tag.  On manual dispatch
          # (workflow_dispatch) GITHUB_REF is refs/heads/<branch> and we
          # skip the match — the dispatch is for testing the pipeline, not
          # publishing a real release, and the publish job is gated below
          # so nothing ships.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF##*/}"
            echo "Tag:           $tag"
            if [ "$version" != "$tag" ]; then
              echo "::error::version.sh ($version) does not match the pushed tag ($tag). The tag must point at a commit where version.sh emits exactly that tag."
              exit 1
            fi
          else
            echo "Manual dispatch — skipping tag/version match check."
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bare=$bare" >> "$GITHUB_OUTPUT"

      - name: Check Rust workspace version is in sync
        # Same rationale as the tag/version check above — the sync test
        # gates that tools/Cargo.toml has been bumped to the upcoming
        # tag's version before the tag was pushed.  On
        # workflow_dispatch the working tree's version is whatever
        # version.sh derives from "tag + commits-since" and Cargo.toml
        # legitimately lags.  The dispatch never publishes, so we just
        # log the gap and move on.
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            ./scripts/sync-versions.sh --check
          else
            echo "Manual dispatch — running sync-versions.sh in write mode so the build picks up the current version, but not failing on drift."
            ./scripts/sync-versions.sh
          fi

  build-host-tools-linux:
    name: Build host tools (linux x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libelf-dev cmake ninja-build python3

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('tools/Cargo.lock') }}

      - name: Build Rust workspace (release)
        working-directory: tools
        run: cargo build --release --workspace

      - name: Build sprx-linker
        run: make -C tools/sprx-linker

      - name: Build rsx-cg-compiler
        run: |
          cmake -S tools/rsx-cg-compiler -B tools/rsx-cg-compiler/build \
              -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/rsx-cg-compiler/build --target rsx-cg-compiler

      - name: Smoke-test --version flags
        run: |
          tools/target/release/nidgen --version
          tools/target/release/abi-verify --version
          tools/target/release/coverage-report --version
          tools/rsx-cg-compiler/build/rsx-cg-compiler --version
          # sprx-linker has no --version yet; just confirm it's a runnable ELF.
          file tools/sprx-linker/sprxlinker

      - name: Stage tool tarball
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-tools-${version}-linux-x86_64"
          mkdir -p "$stage/bin"
          # Rust binaries.
          for bin in nidgen abi-verify coverage-report; do
            cp "tools/target/release/$bin" "$stage/bin/"
          done
          # C/C++ binaries.
          cp tools/sprx-linker/sprxlinker "$stage/bin/"
          cp tools/rsx-cg-compiler/build/rsx-cg-compiler "$stage/bin/"
          # Strip everything (best-effort).
          strip "$stage/bin/"* || true
          # Bundle a tiny README that lists runtime deps.
          cat > "$stage/README.txt" <<EOF
          PS3 Custom Toolchain — host tools, ${version}, linux x86_64.

          Drop the contents of bin/ into \$PS3DEV/bin/ on a host where the
          toolchain is already built, or anywhere on \$PATH for ad-hoc use.

          Runtime dependencies (dynamic):
            * sprxlinker         — libelf, libz, libzstd
            * rsx-cg-compiler    — libstdc++ (system)
            * nidgen, abi-verify, coverage-report — none beyond glibc

          See CHANGELOG.md for what changed in this release.
          EOF
          cp CHANGELOG.md "$stage/" || true
          tar -cJf "${stage}.tar.xz" "$stage"
          sha256sum "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: host-tools-linux-x86_64
          path: ps3-sdk-tools-*-linux-x86_64.tar.*

  build-host-tools-windows:
    name: Build host tools (windows x86_64)
    needs: verify-version
    runs-on: windows-latest
    defaults:
      run:
        # All run: steps execute inside the MSYS2 mingw64 shell.  This
        # gives us a single ABI (gnu) for every binary in the tarball
        # and access to mingw-w64's libelf, which sprx-linker needs.
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up MSYS2 / mingw64
        # The MSYS2 download server (repo.msys2.org) intermittently returns
        # HTTP 502 from its CDN.  Action's built-in retry is two attempts
        # over ~30s, which sometimes isn't enough to ride out a transient
        # gateway flap.  We give it three full action invocations
        # (continue-on-error on the first two) and turn on the action's
        # own cache so a successful run sticks in the runner cache and
        # later runs skip the network entirely.
        id: msys2_attempt1
        continue-on-error: true
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libelf
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-python
            mingw-w64-x86_64-rust

      - name: Set up MSYS2 / mingw64 (retry 1)
        id: msys2_attempt2
        if: steps.msys2_attempt1.outcome == 'failure'
        continue-on-error: true
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libelf
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-python
            mingw-w64-x86_64-rust

      - name: Set up MSYS2 / mingw64 (retry 2)
        if: steps.msys2_attempt1.outcome == 'failure' && steps.msys2_attempt2.outcome == 'failure'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libelf
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-python
            mingw-w64-x86_64-rust

      - name: Probe toolchain
        run: |
          set -e
          gcc --version | head -1
          g++ --version | head -1
          cargo --version
          rustc --version
          cmake --version | head -1
          pkg-config --modversion libelf || true

      - name: Build Rust workspace (release)
        working-directory: tools
        env:
          CARGO_BUILD_JOBS: '4'
        run: cargo build --release --workspace

      - name: Build sprx-linker (statically linked)
        run: |
          set -e
          cd tools/sprx-linker
          # Static link so the resulting .exe doesn't depend on
          # libelf-0.dll, libz-1.dll, libzstd.dll, libwinpthread, etc.
          # being on the user's PATH.  Plain `make` would dynamic-link.
          gcc -O2 -Wall -std=gnu99 -static -o sprxlinker.exe sprx-linker.c \
              -lelf -lz -lzstd
          file sprxlinker.exe

      - name: Build rsx-cg-compiler (statically linked)
        run: |
          set -e
          cmake -S tools/rsx-cg-compiler -B tools/rsx-cg-compiler/build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"
          cmake --build tools/rsx-cg-compiler/build --target rsx-cg-compiler
          file tools/rsx-cg-compiler/build/rsx-cg-compiler.exe

      - name: Smoke-test --version flags
        run: |
          set -e
          tools/target/release/nidgen.exe --version
          tools/target/release/abi-verify.exe --version
          tools/target/release/coverage-report.exe --version
          tools/rsx-cg-compiler/build/rsx-cg-compiler.exe --version
          file tools/sprx-linker/sprxlinker.exe

      - name: Stage tool zip
        run: |
          set -e
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-tools-${version}-windows-x86_64"
          mkdir -p "$stage/bin"
          for bin in nidgen abi-verify coverage-report; do
            cp "tools/target/release/${bin}.exe" "$stage/bin/"
          done
          cp tools/sprx-linker/sprxlinker.exe                       "$stage/bin/"
          cp tools/rsx-cg-compiler/build/rsx-cg-compiler.exe        "$stage/bin/"
          # Strip best-effort.
          strip "$stage/bin/"*.exe || true
          # Bundled README.
          cat > "$stage/README.txt" <<EOF
          PS3 Custom Toolchain — host tools, ${version}, windows x86_64.

          Drop the contents of bin\\ into %PS3DEV%\\bin\\ on a Windows host
          where the toolchain is already built, or anywhere on %PATH% for
          ad-hoc use.

          All .exe files are statically linked against MinGW-w64 runtime
          and libelf / zlib / zstd; they have no DLL runtime dependencies
          beyond what every Windows install ships (kernel32, msvcrt).

          See CHANGELOG.md for what changed in this release.
          EOF
          cp CHANGELOG.md "$stage/" || true
          # Use zip (canonical Windows distribution format) rather than
          # tar.xz — Windows users can double-click it.
          zip -r -9 "${stage}.zip" "$stage"
          sha256sum "${stage}.zip" > "${stage}.zip.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: host-tools-windows-x86_64
          path: |
            ps3-sdk-tools-*-windows-x86_64.zip
            ps3-sdk-tools-*-windows-x86_64.zip.sha256

  build-source-bundle:
    name: Build source bundle
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Stage source bundle
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          stage="ps3-sdk-src-${version}"
          # Curated archive: the parts actually authored in this repo.
          # Excludes vendored upstream (src/ via .gitignore) and the
          # private reference mount (reference/ via .gitignore).
          git archive --format=tar --prefix="${stage}/" HEAD \
              | xz -T0 > "${stage}.tar.xz"
          sha256sum "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          ls -l "${stage}".*

      - uses: actions/upload-artifact@v5
        with:
          name: source-bundle
          path: ps3-sdk-src-*.tar.*

  build-toolchain-windows:
    name: Build toolchain (windows x86_64)
    # Single-job, serial PPU+SPU build of the Windows-hosted toolchain release.
    # Stage 0 (native Linux PPU+SPU+PSL1GHT+portlibs+SDK+stub-archives) feeds
    # stage 1 (cross-build PPU+SPU to mingw-w64), then package-windows-release.sh
    # combines that with the Windows host-tools artifact from
    # build-host-tools-windows into a single release zip.  Wall-clock ~2-3h.
    # Caching + PPU/SPU parallelisation are deferred to a follow-up task — this
    # is the first-pass green build.
    #
    # Runs unconditionally on tag push.  On manual workflow_dispatch the user
    # must opt in via the run_toolchain_windows input (defaulting false) so
    # casual "test the publish flow" dispatches don't burn a 3-hour runner.
    if: github.event_name == 'push' || github.event.inputs.run_toolchain_windows == 'true'
    needs:
      - verify-version
      - build-host-tools-windows
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build deps + mingw-w64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential gcc-12 g++-12 cmake ninja-build texinfo \
              bison flex libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
              zlib1g-dev libreadline-dev libncurses-dev libexpat1-dev \
              libssl-dev libelf-dev python3 python3-dev git wget patch \
              autoconf automake libtool zip unzip \
              mingw-w64 g++-mingw-w64-x86-64
          # Verify the mingw cross compiler resolves before anything is built —
          # cross-build silently degrades into "build only host bits then
          # complain at install time" if the cross gcc isn't on PATH.
          which x86_64-w64-mingw32-gcc x86_64-w64-mingw32-g++

      - uses: dtolnay/rust-toolchain@stable

      - name: Probe build env
        run: |
          gcc --version | head -1
          x86_64-w64-mingw32-gcc --version | head -1
          rustc --version
          cmake --version | head -1

      - name: Bootstrap upstream sources
        run: |
          source scripts/env.sh
          ./scripts/bootstrap.sh

      - name: Stage 0 — native PPU toolchain
        run: |
          source scripts/env.sh
          ./scripts/build-ppu-toolchain.sh

      - name: Stage 0 — native SPU toolchain
        run: |
          source scripts/env.sh
          ./scripts/build-spu-toolchain.sh

      - name: Stage 0 — PSL1GHT runtime
        run: |
          source scripts/env.sh
          ./scripts/build-psl1ght.sh

      - name: Stage 0 — portlibs
        run: |
          source scripts/env.sh
          ./scripts/build-portlibs.sh

      - name: Stage 0 — our SDK
        run: |
          source scripts/env.sh
          ./scripts/build-sdk.sh

      - name: Stage 0 — cell stub archives
        run: |
          source scripts/env.sh
          ./scripts/build-cell-stub-archives.sh

      - name: Stage 1 — cross-build PPU toolchain (mingw-w64)
        run: |
          source scripts/env.sh
          ./scripts/build-ppu-toolchain.sh --host=x86_64-w64-mingw32

      - name: Stage 1 — cross-build SPU toolchain (mingw-w64)
        run: |
          source scripts/env.sh
          ./scripts/build-spu-toolchain.sh --host=x86_64-w64-mingw32

      - name: Download host-tools-windows artifact
        uses: actions/download-artifact@v5
        with:
          name: host-tools-windows-x86_64
          path: artifacts/host-tools-windows

      - name: Stage 2 — package Windows release zip
        run: |
          source scripts/env.sh
          tools_zip="$(find artifacts/host-tools-windows -type f -name 'ps3-sdk-tools-*-windows-x86_64.zip' | head -n1)"
          [ -n "$tools_zip" ] || { echo "::error::host-tools-windows zip not found"; exit 1; }
          ./scripts/package-windows-release.sh --tools-zip="$tools_zip"
          ls -lh stage/release/

      - uses: actions/upload-artifact@v5
        with:
          name: toolchain-windows-x86_64
          path: |
            stage/release/ps3-sdk-*-windows-x86_64.zip
            stage/release/ps3-sdk-*-windows-x86_64.zip.sha256

  publish:
    name: Publish GitHub Release
    # Only publish on a real tag push — workflow_dispatch runs the pipeline
    # for verification and uploads artifacts, but never touches the GitHub
    # Releases page.  This lets us test the build-toolchain-windows job
    # without accidentally minting a release.
    if: github.event_name == 'push'
    needs:
      - verify-version
      - build-host-tools-linux
      - build-host-tools-windows
      - build-toolchain-windows
      - build-source-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true   # flatten all artifacts into artifacts/ directly

      - name: Show downloaded artifacts
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo
          echo "=== Artifacts tree ==="
          if [ -d artifacts ]; then
            find artifacts -type f | sort
          else
            echo "ERROR: artifacts/ directory does not exist."
            exit 1
          fi

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          # Pull the section between '## [<version>]' and the next '## ['.
          # If extraction fails for any reason, fall back to a generic body.
          awk -v want="$version" '
              $0 ~ "^## \\[" want "\\]" { capture = 1; next }
              capture && /^## \[/        { exit }
              capture                    { print }
          ' CHANGELOG.md > .release-notes.md
          if [ ! -s .release-notes.md ]; then
            echo "Release ${version}." > .release-notes.md
          fi
          echo "notes_path=.release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          version="${{ needs.verify-version.outputs.version }}"

          # Collect every release asset.  Listed alphabetically so the GH
          # release page renders them in a stable order.
          mapfile -t assets < <(find artifacts -type f \( \
              -name '*.tar.xz' -o -name '*.tar.xz.sha256' -o \
              -name '*.zip'    -o -name '*.zip.sha256' \) | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets found under artifacts/. Check the download-artifact step output above."
            exit 1
          fi

          echo "Will upload ${#assets[@]} release assets:"
          printf '  %s\n' "${assets[@]}"

          # If a release already exists for this tag (e.g. from a previous
          # workflow run that we want to retry), delete it first so we
          # start with a clean slate.  The git tag itself is preserved.
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists — deleting before recreating."
            gh release delete "$version" --yes --cleanup-tag=false
          fi

          gh release create "$version" \
              --title "$version" \
              --notes-file "${{ steps.notes.outputs.notes_path }}" \
              "${assets[@]}"
